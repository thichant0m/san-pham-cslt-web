<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Đăng nhập</h2>
            <!--giao diện đăng nhập-->
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Mật khẩu</label><input type="password" id="password" required></div>
                <button type="submit" class="btn" style="width:100%">Đăng nhập</button>
            </form>
            <p style="text-align: center; margin-top: 15px;">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const data = await apiFetch('/auth/login', 'POST', {
                    email: e.target.email.value,
                    password: e.target.password.value
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } catch (err) { alert(err.message); }
        };
    </script>
</body>
</html>
